Summary: Unofficial BBC Radio and podcast player
Description: |
  Unofficial Android client for BBC Radio and BBC podcasts.

  Features include live radio playback, podcast browsing and subscription,
  background index refresh, Android Auto compatible media browsing,
  episode progress tracking, and offline playback for downloaded episodes.

