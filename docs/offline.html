<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBC Radio Player - Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 520px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 16px;
      padding: 28px;
      backdrop-filter: blur(3px);
    }
    h1 { font-size: 28px; margin-bottom: 10px; }
    p { line-height: 1.6; opacity: 0.95; margin-bottom: 16px; }
    a {
      display: inline-block;
      margin-top: 4px;
      background: white;
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>📡 You are offline</h1>
    <p>The BBC Radio Player web app needs an internet connection for live streams and podcast feeds.</p>
    <p>Once you are connected again, reopen the app to continue listening.</p>
    <a href="./">Try again</a>
  </main>
</body>
</html>
