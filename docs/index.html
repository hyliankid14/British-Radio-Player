            async loadContent(type, id) {
                // Parse URL parameters for real podcast/episode data
                const params = new URLSearchParams(window.location.hash.split('?')[1] || '');
                
                console.log('Loading content:', { type, id, params: Object.fromEntries(params) });
                
                if (type === 'p') {
                    // Podcast - use inline data from params
                    const title = params.get('title');
                    const desc = params.get('desc');
                    const img = params.get('img');
                    const rssUrl = params.get('rss');
                    
                    this.currentContent = {
                        type: 'podcast',
                        id: id,
                        title: title || 'Shared Podcast',
                        description: desc || 'This podcast was shared with you from the British Radio Player app.',
                        imageUrl: img || null,
                        rssUrl: rssUrl
                    };
                    
                    // Track podcast view
                    this.trackEvent('web_player_podcast_view', {
                        podcast_id: id,
                        podcast_title: this.currentContent.title
                    });
                    
                    this.render();
                    
                    // After rendering, load episodes from RSS if available
                    if (rssUrl) {
                        await this.loadEpisodes(rssUrl);
                    }
                } else {
                    // Episode data from URL params
                    const content = {
                        type: 'episode',
                        id: id,
                        title: params.get('title') || 'Shared Episode',
                        description: params.get('desc') || 'This episode was shared with you from the British Radio Player app.',
                        podcastTitle: params.get('podcast') || 'British Radio Player',
                        podcastId: params.get('podcastId') || '',
                        imageUrl: params.get('img') || null,
                        audioUrl: params.get('audio') || null,
                        pubDate: params.get('date') || '',
                        durationMins: parseInt(params.get('duration') || '0')
                    };
                    this.currentContent = content;
                    
                    // Track episode view
                    this.trackEvent('web_player_episode_view', {
                        episode_id: id,
                        episode_title: content.title,
                        podcast_id: content.podcastId,
                        podcast_title: content.podcastTitle
                    });
                    
                    this.render();
                }
            }

            render() {
                const app = document.getElementById('app');
                const content = this.currentContent;

                if (!content) {
                    this.showError('Error', 'No content to display');
                    return;
                }

                if (content.type === 'podcast') {
                    app.innerHTML = this.renderPodcast(content);
                } else {
                    app.innerHTML = this.renderEpisode(content);
                }

                // Attach audio event listeners after rendering
                setTimeout(() => this.attachAudioListeners(), 100);
            }

            attachAudioListeners() {
                const audioElements = document.querySelectorAll('audio');
                audioElements.forEach((audio, index) => {
                    audio.addEventListener('play', () => {
                        if (this.currentContent) {
                            clearTimeout(audio._audioAnalyticsTimer);
                            const capturedContent = this.currentContent;
                            audio._audioAnalyticsTimer = setTimeout(() => {
                                if (!audio.paused && this.currentContent?.id === capturedContent.id) {
                                    const trackData = {
                                        content_type: capturedContent.type,
                                        content_id: capturedContent.id,
                                        content_title: capturedContent.title,
                                        source: 'web_player'
                                    };

                                    if (capturedContent.type === 'episode') {
                                        trackData.podcast_id = capturedContent.podcastId;
                                        trackData.podcast_title = capturedContent.podcastTitle;
                                    }

                                    this.trackEvent('web_player_audio_play', trackData);
                                }
                                audio._audioAnalyticsTimer = null;
                            }, 10000);
                        }
                    });
                    audio.addEventListener('pause', () => {
                        clearTimeout(audio._audioAnalyticsTimer);
                        audio._audioAnalyticsTimer = null;
                    });
                });
            }

            openInApp(type) {
                // The share page uses hash-based routing (#/p/id or #/e/id)
                const hash = window.location.hash;
                const match = hash.match(/#\/(p|e)\/([^\/?]+)/);
                if (!match) return;

                const [, routeType, rawId] = match;
                const contentType = routeType === 'p' ? 'podcast' : 'episode';
                const id = decodeURIComponent(rawId || '');
                const appHost = contentType === 'podcast' ? 'podcast' : 'episode';

                const params = new URLSearchParams();
                if (contentType === 'episode' && this.currentContent) {
                    if (this.currentContent.title) params.set('title', this.currentContent.title);
                    if (this.currentContent.description) params.set('desc', this.currentContent.description);
                    if (this.currentContent.podcastTitle) params.set('podcast', this.currentContent.podcastTitle);
                    if (this.currentContent.podcastId) params.set('podcastId', this.currentContent.podcastId);
                    if (this.currentContent.audioUrl) params.set('audio', this.currentContent.audioUrl);
                    if (this.currentContent.imageUrl) params.set('img', this.currentContent.imageUrl);
                    if (this.currentContent.pubDate) params.set('date', this.currentContent.pubDate);
                    if (this.currentContent.durationMins) params.set('duration', String(this.currentContent.durationMins));
                }

                const query = params.toString();
                const path = `/${encodeURIComponent(id)}`;
                const customSchemeUrl = `app://${appHost}${path}${query ? `?${query}` : ''}`;

                const isAndroid = /Android/i.test(navigator.userAgent || '');
                const packageName = 'com.hyliankid14.bbcradioplayer';
                const deepLink = isAndroid
                    ? `intent://${appHost}${path}${query ? `?${query}` : ''}#Intent;scheme=app;package=${packageName};end`
                    : customSchemeUrl;

                let appOpened = false;
                const onVisibilityChange = () => {
                    if (document.visibilityState === 'hidden') {
                        appOpened = true;
                    }
                };
                document.addEventListener('visibilitychange', onVisibilityChange);

                window.location.href = deepLink;

                setTimeout(() => {
                    document.removeEventListener('visibilitychange', onVisibilityChange);
                    if (!appOpened) {
                        alert('Could not open the app. Make sure British Radio Player is installed.');
                    }
                }, 1200);
            }

            async copyShareLink(type) {
                const button = event?.target || document.querySelector('[onclick*="copyShareLink"]');
                const originalText = button?.innerHTML || '🔗 Copy Link';
                if (button) button.innerHTML = '🔗 Shortening...';

                // Build a share URL manually so we can shorten any long description
                let shareUrl = window.location.origin + window.location.pathname;
                const hash = window.location.hash;
                const [route] = hash.split('?'); // e.g. "#/p/id"
                shareUrl += route;

                const params = new URLSearchParams();
                const content = this.currentContent || {};
                if (content.title) params.set('title', content.title);
                if (content.description) {
                    try {
                        const shortDesc = await this.shortenTextWithAI(content.description);
                        params.set('desc', shortDesc);
                    } catch (aiErr) {
                        console.warn('AI shorten failed, using original description', aiErr);
                        params.set('desc', content.description);
                    }
                }
                if (content.imageUrl) params.set('img', content.imageUrl);
                if (content.rssUrl) params.set('rss', content.rssUrl);
                if (content.podcastTitle) params.set('podcast', content.podcastTitle);
                if (content.podcastId) params.set('podcastId', content.podcastId);
                if (content.audioUrl) params.set('audio', content.audioUrl);
                if (content.pubDate) params.set('date', content.pubDate);
                if (content.durationMins) params.set('duration', content.durationMins);

                if ([...params].length > 0) {
                    shareUrl += '?' + params.toString();
                }

                this.shortenUrl(shareUrl).then(shortUrl => {
                    navigator.clipboard.writeText(shortUrl).then(() => {
                        if (button) {
                            button.innerHTML = '✅ Copied!';
                            setTimeout(() => {
                                button.innerHTML = originalText;
                            }, 2000);
                        }
                    }).catch(() => {
                        alert('Failed to copy link. Please try again.');
                        if (button) button.innerHTML = originalText;
                    });
                }).catch(error => {
                    console.error('Failed to shorten URL:', error);
                    // Fallback: copy full URL
                    navigator.clipboard.writeText(shareUrl).then(() => {
                        if (button) {
                            button.innerHTML = '✅ Copied (full link)';
                            setTimeout(() => {
                                button.innerHTML = originalText;
                            }, 2000);
                        }
                    }).catch(() => {
                        alert('Failed to copy link. Please try again.');
                        if (button) button.innerHTML = originalText;
                    });
                });
            }

            shortenUrl(longUrl) {
                return fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(longUrl)}`)
                    .then(response => response.json())
                    .then(data => data.shorturl || longUrl)
                    .catch(error => {
                        console.error('URL shortening failed:', error);
                        return longUrl;

            /**
             * Shorten description text on-device only.
             */
            async shortenTextWithAI(text) {
                if (!text) return '';

                const plainText = this.stripHtml(text).replace(/\s+/g, ' ').trim();
                if (!plainText) return '';

                const cleanText = plainText.substring(0, 2000).trim();
                if (!cleanText) return '';

                const sentenceSplit = cleanText
                    .split(/(?<=[.!?])\s+(?=[A-Z])|(?<=[.!?])$/)
                    .map(s => s.trim())
                    .filter(s => s.length > 10);

                if (sentenceSplit.length === 0) {
                    return this.limitToWords(cleanText, 30);
                }

                if (sentenceSplit.length === 1) {
                    const single = this.limitToWords(sentenceSplit[0], 30);
                    return single.endsWith('.') ? single : `${single}.`;
                }

                const combined = sentenceSplit
                    .slice(0, 2)
                    .map(s => s.replace(/[.!?]+$/, '').trim())
                    .filter(Boolean)
                    .join('. ');

                if (!combined) {
                    return this.limitToWords(cleanText, 30);
                }

                const limited = this.limitToWords(combined, 40);
                return limited.endsWith('.') ? limited : `${limited}.`;
            }

            limitToWords(text, maxWords) {
                const words = String(text || '').trim().split(/\s+/).filter(Boolean);
                if (words.length <= maxWords) return words.join(' ');
                return words.slice(0, maxWords).join(' ') + '...';
            }

            async loadPodcastFromRSS(rssUrl, id) {
                try {
                    const proxyUrl = 'https://api.allorigins.win/raw?url=';
                    const response = await fetch(proxyUrl + encodeURIComponent(rssUrl));
                    const text = await response.text();
                    
                    const parser = new DOMParser();
                    const xml = parser.parseFromString(text, 'text/xml');
                    
                    const channel = xml.querySelector('channel');
                    const itunesImage = channel?.querySelector('image')?.querySelector('url')?.textContent ||
                                       channel?.querySelector('itunes\\:image, image[href]')?.getAttribute('href') || null;
                    
                    this.currentContent = {
                        type: 'podcast',
                        id: id,
                        title: channel?.querySelector('title')?.textContent || 'Shared Podcast',
                        description: channel?.querySelector('description')?.textContent || 'Podcast shared from British Radio Player',
                        imageUrl: itunesImage,
                        rssUrl: rssUrl
                    };
                    
                    this.render();
                    await this.loadEpisodes(rssUrl);
                } catch (error) {
                    console.error('Failed to load podcast from RSS:', error);
                    this.currentContent = {
                        type: 'podcast',
                        id: id,
                        title: 'Shared Podcast',
                        description: 'Unable to load podcast details.',
                        imageUrl: null,
                        rssUrl: rssUrl
                    };
                    this.render();
                }
            }

            async loadEpisodes(rssUrl) {
                try {
                    if (!rssUrl) {
                        console.log('No RSS URL provided');
                        return;
                    }
                    
                    // Ensure RSS URL is decoded
                    const decodedRssUrl = decodeURIComponent(rssUrl);
                    console.log('Loading episodes from RSS:', decodedRssUrl);
                    
                    // Set a timeout for large feeds
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 15000); // 15 second timeout
                    
                    let text = '';
                    
                    try {
                        const proxyUrl = 'https://api.allorigins.win/raw?url=';
                        const response = await fetch(proxyUrl + encodeURIComponent(decodedRssUrl), {
                            signal: controller.signal
                        });
                        
                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status}`);
                        }
                        
                        // For large feeds, try to read just enough for 10 episodes
                        const reader = response.body.getReader();
                        const decoder = new TextDecoder();
                        let itemCount = 0;
                        
                        while (true) {
                            const { done, value } = await reader.read();
                            
                            if (done) break;
                            
                            const chunk = decoder.decode(value, { stream: true });
                            text += chunk;
                            
                            // Count closed items (complete items only)
                            const closedMatches = text.match(/<\/item>/gi);
                            itemCount = closedMatches ? closedMatches.length : 0;
                            
                            // Only stop early if the feed is getting very large (>2MB) and we have at least 10 episodes
                            // This allows smaller series to load completely
                            if (text.length > 2000000 && itemCount >= 10) {
                                console.log(`Feed is large (${Math.round(text.length/1024)}KB) and has ${itemCount} episodes, stopping read`);
                                reader.cancel();
                                
                                // Find the position after the last </item> tag
                                const lastItemEnd = text.lastIndexOf('</item>');
                                if (lastItemEnd !== -1) {
                                    // Truncate after the last complete item
                                    text = text.substring(0, lastItemEnd + 7); // 7 = length of '</item>'
                                    // Add proper closing tags
                                    text += '\n</channel>\n</rss>';
                                }
                                break;
                            }
                            
                            // Hard limit: if we've read more than 10MB, stop regardless
                            if (text.length > 10000000) {
                                console.log('Feed extremely large (>10MB), stopping read');
                                reader.cancel();
                                
                                // Find the last complete item
                                const lastItemEnd = text.lastIndexOf('</item>');
                                if (lastItemEnd !== -1) {
                                    text = text.substring(0, lastItemEnd + 7);
                                    text += '\n</channel>\n</rss>';
                                }
                                break;
                            }
                        }
                        
                        clearTimeout(timeoutId);
                    } catch (proxyError) {
                        clearTimeout(timeoutId);
                        console.warn('Primary CORS proxy failed, trying alternative:', proxyError.message);
                        
                        // Try alternative proxy without streaming (simpler, for fallback)
                        try {
                            const altController = new AbortController();
                            const altTimeoutId = setTimeout(() => altController.abort(), 10000);
                            
                            const altProxyUrl = 'https://corsproxy.io/?';
                            const altResponse = await fetch(altProxyUrl + encodeURIComponent(decodedRssUrl), {
                                signal: altController.signal
                            });
                            
                            clearTimeout(altTimeoutId);
                            
                            if (!altResponse.ok) {
                                throw new Error(`HTTP ${altResponse.status}`);
                            }
                            
                            text = await altResponse.text();
                            console.log('Alternative proxy succeeded');
                        } catch (altError) {
                            console.warn('Alternative CORS proxy also failed:', altError.message);
                            throw new Error('Feed unavailable');
                        }
                    }
                    
                    console.log('Received RSS data, length:', text.length);
                    
                    const parser = new DOMParser();
                    const xml = parser.parseFromString(text, 'text/xml');
                    
                    // Check for parse errors
                    if (xml.documentElement.tagName === 'parsererror') {
                        console.error('XML parse error:', xml.documentElement.textContent);
                        throw new Error('Failed to parse RSS feed');
                    }
                    
                    const items = xml.querySelectorAll('item');
                    console.log('Found', items.length, 'episodes');
                    
                    if (items.length === 0) {
                        throw new Error('No episodes found in feed');
                    }
                    
                    this.allEpisodes = Array.from(items).map(item => {
                        const enclosure = item.querySelector('enclosure');
                        return {
                            title: item.querySelector('title')?.textContent || 'Untitled',
                            description: item.querySelector('description')?.textContent || '',
                            audioUrl: enclosure?.getAttribute('url') || '',
                            pubDate: item.querySelector('pubDate')?.textContent || '',
                            duration: this.parseDuration(item.querySelector('duration')?.textContent)
                        };
                    });
                    
                    this.displayedCount = 0;
                    this.episodes = [];
                    this.loadMoreEpisodes();
                } catch (error) {
                    console.error('Failed to load episodes:', error);
                    // Show a helpful message for large podcasts instead of hiding the section
                    const episodesSection = document.getElementById('episodes-section');
                    if (episodesSection) {
                        episodesSection.innerHTML = `
                            <div style="margin-top: 30px; text-align: center; padding: 40px 20px; background: #f8f8f8; border-radius: 12px;">
                                <div style="font-size: 48px; margin-bottom: 16px;">📚</div>
                                <h3 style="font-size: 20px; margin-bottom: 12px; color: #333;">Episode Library Unavailable</h3>
                                <p style="font-size: 15px; color: #666; line-height: 1.6; max-width: 500px; margin: 0 auto;">
                                    This podcast has many episodes. For the complete library with playback, 
                                    search, and download features, install the British Radio Player app.
                                </p>
                            </div>
                        `;
                    }
                }
            }

            parseDuration(durationStr) {
                if (!durationStr) return 0;
                const parts = durationStr.split(':');
                if (parts.length === 3) {
                    return parseInt(parts[0]) * 60 + parseInt(parts[1]);
                } else if (parts.length === 2) {
                    return parseInt(parts[0]);
                }
                return parseInt(durationStr) / 60 || 0;
            }

            loadMoreEpisodes() {
                const start = this.displayedCount;
                const end = Math.min(start + this.episodesPerPage, this.allEpisodes.length);
                
                const newEpisodes = this.allEpisodes.slice(start, end);
                this.episodes.push(...newEpisodes);
                this.displayedCount = end;
                
                this.renderEpisodesList();
            }

            renderEpisodesList() {
                const episodesSection = document.getElementById('episodes-section');
                if (!episodesSection || this.episodes.length === 0) return;
                
                const hasMore = this.displayedCount < this.allEpisodes.length;
                
                episodesSection.innerHTML = `
                    <div style="margin-top: 30px;">
                        <h3 style="font-size: 20px; margin-bottom: 20px; color: #333;">Recent Episodes</h3>
                        ${this.episodes.map((ep, index) => `
                            <div style="background: #f8f8f8; border-radius: 12px; padding: 20px; margin-bottom: 16px;">
                                <h4 style="font-size: 16px; margin-bottom: 8px; color: #333;">${this.escapeHtml(ep.title)}</h4>
                                <p style="font-size: 13px; color: #666; margin-bottom: 12px; line-height: 1.4;">
                                    ${this.escapeHtml(this.stripHtml(ep.description).substring(0, 150))}${ep.description.length > 150 ? '...' : ''}
                                </p>
                                ${ep.pubDate ? `<p style="font-size: 12px; color: #999; margin-bottom: 12px;">${this.formatDate(ep.pubDate)}${ep.duration > 0 ? ` • ${Math.round(ep.duration)} min` : ''}</p>` : ''}
                                ${ep.audioUrl ? `
                                    <audio controls style="width: 100%; margin-top: 12px; border-radius: 8px;">
                                        <source src="${this.escapeHtml(ep.audioUrl)}" type="audio/mpeg">
                                        Your browser does not support the audio element.
                                    </audio>
                                ` : ''}
                            </div>
                        `).join('')}
                        ${hasMore ? `
                            <div style="text-align: center; margin-top: 20px;">
                                <button onclick="player.loadMoreEpisodes()" style="
                                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                                    color: white;
                                    border: none;
                                    padding: 12px 32px;
                                    font-size: 16px;
                                    font-weight: 600;
                                    border-radius: 8px;
                                    cursor: pointer;
                                    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
                                    transition: transform 0.2s, box-shadow 0.2s;
                                " onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 20px rgba(102, 126, 234, 0.5)';" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(102, 126, 234, 0.4)';">
                                    Load More Episodes (${this.allEpisodes.length - this.displayedCount} remaining)
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }

            stripHtml(html) {
                const doc = new DOMParser().parseFromString(html, 'text/html');
                return doc.body.textContent || '';
            }

            formatDate(dateStr) {
                try {
                    const date = new Date(dateStr);
                    return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                } catch {
                    return dateStr;
                }
            }

            showError(title, message) {
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="header">
                        <h1>🎙️ British Radio Player</h1>
                        <p>Podcast Sharing</p>
                    </div>
                    <div class="error-state">
                        <div class="error-icon">⚠️</div>
                        <h2 style="margin-bottom: 10px;">${this.escapeHtml(title)}</h2>
                        <p class="error-message">${this.escapeHtml(message)}</p>
                        <button class="button button-primary" onclick="window.location.href='/'">
                            ← Go Home
                        </button>
                    </div>
                `;
            }

            showLandingPage() {
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="header">
                        <h1>🎙️ British Radio Player</h1>
                        <p>Podcast & Episode Sharing</p>
                    </div>
                    <div class="content">
                        <div class="hero-text" style="text-align: center;">
                            <div style="font-size: 64px; margin-bottom: 20px;">🎧</div>
                            <h2>Welcome to British Radio Player</h2>
                            <p style="font-size: 16px; margin-bottom: 20px;">
                                Your unofficial Android client for BBC Radio and podcasts with support for Android Auto, 
                                podcast subscriptions, downloads, and episode sharing.
                            </p>
                        </div>

                        <div style="background: #f8f8f8; border-radius: 12px; padding: 24px; margin: 30px 0;">
                            <h3 style="font-size: 18px; margin-bottom: 16px; color: #333;">✨ Features</h3>
                            <ul style="margin: 0; padding-left: 20px; color: #666; line-height: 1.8;">
                                <li>Browse BBC stations and podcasts</li>
                                <li>Subscribe to and download episodes</li>
                                <li>Android Auto support</li>
                                <li>Share episodes with friends</li>
                                <li>Material 3 design with dark mode</li>
                                <li>Background downloads and notifications</li>
                            </ul>
                        </div>

                        <div class="button-group" style="flex-direction: column;">
                            <a href="https://github.com/hyliankid14/British-Radio-Player/releases" class="button button-primary" target="_blank">
                                📥 Download Latest Release
                            </a>
                            <a href="https://github.com/hyliankid14/British-Radio-Player" class="button button-secondary" target="_blank">
                                🔗 View on GitHub
                            </a>
                            <button class="button button-secondary" onclick="player.openWebApp()">
                                🌐 Open Radio & Podcasts
                            </button>
                        </div>

                        <div style="background: #f0f0f0; border-radius: 12px; padding: 20px; margin-top: 30px; text-align: center;">
                            <div style="font-size: 14px; color: #666; margin-bottom: 12px;">
                                <strong>Share Your Favorite Podcast or Episode</strong>
                            </div>
                            <p style="font-size: 13px; color: #999; margin-bottom: 0;">
                                Use the British Radio Player app to share podcasts and episodes. Recipients will be able to preview and listen directly from this web player.
                            </p>
                        </div>

                        <div class="publication-info" style="justify-content: center; flex-direction: column; text-align: center; margin-top: 40px;">
                            <p style="font-size: 12px; color: #999; margin-bottom: 8px;">
                                Unofficial third-party app. BBC and station trademarks are owned by the British Broadcasting Corporation.
                            </p>
                            <p style="font-size: 12px; color: #999;">
                                Streams use public BBC APIs. No affiliation or endorsement intended.
                            </p>
                        </div>
                    </div>
                `;
            }

            escapeHtml(text) {
                if (!text) return '';
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return String(text).replace(/[&<>"']/g, m => map[m]);
            }
        }

        // Initialize the player
        const player = new PodcastPlayer();
    </script>
