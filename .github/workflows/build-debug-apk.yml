name: Build Debug APK

# Builds a debug APK for sideloading on a device.  The APK is signed with the
# shared debug keystore (keystore/debug.keystore) so CI and local builds share
# the same key and can upgrade-in-place without reinstalling.
#
# After a successful build the APK is published as a GitHub pre-release asset
# under the rolling tag "debug-apk-latest".  Pre-release assets have a direct
# browser_download_url (no zip, no GitHub login required) that works in any
# browser — including the GitHub mobile app.

on:
  workflow_dispatch:       # allow manual trigger from the Actions tab
  push:
    branches:
      - 'copilot/**'        # auto-build for Copilot PR branches

permissions:
  contents: write          # needed to create/update the rolling debug-apk-latest release

jobs:
  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required so 'git describe' can find tags

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compute debug version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch the latest production (non-prerelease) release tag.
          LATEST_TAG=$(gh release list --exclude-pre-releases --limit 1 --json tagName -q '.[0].tagName' 2>&1) || {
            echo "WARNING: gh release list failed (exit $?): ${LATEST_TAG}" >&2
            LATEST_TAG=""
          }

          # Validate that the tag looks like a semver vX.Y.Z string before using it.
          if [[ "$LATEST_TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"

            # Bump patch by 1 so the debug build is always ahead of the release.
            VERSION_NAME="${MAJOR}.${MINOR}.$(( PATCH + 1 ))"

            echo "Latest release: ${LATEST_TAG#v} → debug version name: ${VERSION_NAME}"
          else
            if [[ -n "$LATEST_TAG" ]]; then
              echo "WARNING: release tag '${LATEST_TAG}' is not a semver vX.Y.Z tag; falling back to gradle.properties." >&2
            else
              echo "No production release found; falling back to gradle.properties."
            fi
            # Fall back to the version name already in gradle.properties.
            VERSION_NAME=$(grep -Po '(?<=APP_VERSION_NAME=).+' gradle.properties)
          fi

          # Use a Unix timestamp as the version code so every CI run produces a
          # unique, strictly-increasing value.  This allows users to upgrade
          # successive debug APKs in-place without reinstalling.
          # (Max allowed versionCode is 2,100,000,000; Unix time ~1.7 B in 2025.)
          VERSION_CODE=$(date -u +%s)

          echo "Debug version: ${VERSION_NAME} (code ${VERSION_CODE})"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

      - name: Build github debug APK
        run: |
          ./gradlew assembleGithubDebug \
            -PAPP_VERSION_NAME="${{ steps.version.outputs.version_name }}" \
            -PAPP_VERSION_CODE="${{ steps.version.outputs.version_code }}"

      - name: Publish debug APK as rolling pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="debug-apk-latest"
          APK=$(find app/build/outputs/apk/github/debug -name "*.apk" | head -1)

          # Rename the APK to a fixed filename so the download URL is stable.
          DEST="app/build/outputs/apk/github/debug/british-radio-player-debug.apk"
          mv "$APK" "$DEST"

          # Replace any previous rolling release so only one exists at a time.
          # --cleanup-tag deletes both the GitHub release and the associated git
          # tag atomically via the API, preventing "release already exists" errors.
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

          DEBUG_VERSION="${{ steps.version.outputs.version_name }}"
          NOTES="Rolling debug build \`v${DEBUG_VERSION}-debug\` — branch \`${{ github.ref_name }}\`, commit \`${{ github.sha }}\`."$'\n\n'"This is a pre-release used for sideloading only. It is not a production release."

          # Create a fresh pre-release and attach the APK directly (not zipped).
          gh release create "$TAG" "$DEST" \
            --title "Debug APK (v${DEBUG_VERSION}-debug)" \
            --notes "$NOTES" \
            --prerelease

          APK_URL=$(gh release view "$TAG" --json assets -q '.assets[0].browser_download_url')

          {
            echo "## 📱 Debug APK — direct download"
            echo ""
            echo "**Version: \`v${DEBUG_VERSION}-debug\`**"
            echo ""
            echo "**[⬇️ Download APK]($APK_URL)**"
            echo ""
            echo "Tap the link above to download the APK directly (no zip, no login required)."
            echo "This build is signed with the shared debug keystore — it will install"
            echo "over an existing debug build without needing to uninstall first."
            echo ""
            echo "Branch: \`${{ github.ref_name }}\`  |  Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
