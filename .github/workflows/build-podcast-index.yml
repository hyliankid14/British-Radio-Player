name: Build Podcast Index

# Builds a pre-computed podcast/episode search index from the BBC OPML and RSS
# feeds and commits the result to docs/podcast-index.json.gz so it is served
# via GitHub Pages.  The file is gzip-compressed to stay well below GitHub's
# 100 MB file size limit.  The Android app downloads this file once per day
# instead of fetching hundreds of individual RSS feeds — eliminating per-search
# and per-reindex traffic to the home server.

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every day
  workflow_dispatch:       # allow manual trigger from the Actions tab

permissions:
  contents: write          # needed to push the updated index directly to main

jobs:
  build-index:
    runs-on: ubuntu-latest
    timeout-minutes: 90    # BBC has ~500 podcasts; parallel fetch takes < 5 min

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build podcast index
        run: python3 api/build_index.py

      - name: Commit and push updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/podcast-index.json.gz
          git diff --staged --quiet || git commit -m "chore: refresh podcast index [skip ci]"
          git push
