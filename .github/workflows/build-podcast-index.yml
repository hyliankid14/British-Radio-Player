name: Build Podcast Index

# Builds a pre-computed podcast/episode search index from the BBC OPML and RSS
# feeds and commits the result to docs/podcast-index.json.gz so it is served
# via GitHub Pages.  The file is gzip-compressed to stay well below GitHub's
# 100 MB file size limit.  The Android app downloads this file once per day
# instead of fetching hundreds of individual RSS feeds — eliminating per-search
# and per-reindex traffic to the home server.

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every day
  workflow_dispatch:       # allow manual trigger from the Actions tab

permissions:
  contents: write          # needed to commit the updated index to a branch
  pull-requests: write     # needed to open/update and auto-merge the pull request

jobs:
  build-index:
    runs-on: ubuntu-latest
    timeout-minutes: 90    # BBC has ~500 podcasts; parallel fetch takes < 5 min

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build podcast index
        run: python3 api/build_index.py

      - name: Create pull request with updated index
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: refresh podcast index [skip ci]"
          branch: chore/refresh-podcast-index
          title: "chore: refresh podcast index"
          body: "Automated update of `docs/podcast-index.json.gz` and `docs/podcast-index-meta.json` by the Build Podcast Index workflow."
          add-paths: |
            docs/podcast-index.json.gz
            docs/podcast-index-meta.json
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

      - name: Merge pull request
        if: steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} \
            --repo hyliankid14/BBC-Radio-Player \
            --squash \
            --admin \
            --delete-branch

      - name: Verify merge succeeded
        if: steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATE=$(gh pr view ${{ steps.create-pr.outputs.pull-request-number }} \
            --repo hyliankid14/BBC-Radio-Player \
            --json state,mergedAt \
            --jq '.state')
          if [ "$STATE" != "MERGED" ]; then
            echo "::error::PR ${{ steps.create-pr.outputs.pull-request-number }} was not merged (state=$STATE)"
            exit 1
          fi
          echo "PR ${{ steps.create-pr.outputs.pull-request-number }} merged successfully."
