name: Build Podcast Index

# Builds the pre-computed podcast/episode search index from the BBC OPML and
# RSS feeds.  By default the index is uploaded to Google Cloud Storage (GCS)
# so the Android app can download it and the Cloud Function can serve live
# search queries from it.
#
# Legacy support: this workflow also mirrors the latest index into docs/
# (GitHub Pages) so older app versions keep working during migration.
#
# Required repository secrets
# ───────────────────────────
# GCS_BUCKET             — name of your GCS bucket (e.g. bbc-radio-index)
# GCP_SA_KEY             — raw service-account key JSON that has the
#                          "Storage Object Admin" role on the bucket, OR
#                          configure Workload Identity Federation and remove the
#                          credentials_json line from the auth step below.
#
# Note: if you prefer to run this job entirely on Google Cloud (Cloud Scheduler
# + Cloud Run Job) you can disable this workflow and follow the instructions in
# api/GOOGLE_CLOUD_SETUP.md instead.

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every day
  workflow_dispatch:       # allow manual trigger from the Actions tab

permissions:
  contents: write          # required to update docs/ mirror for legacy clients

jobs:
  build-index:
    runs-on: ubuntu-latest
    timeout-minutes: 90    # BBC has ~500 podcasts; parallel fetch takes < 5 min

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-cloud-storage>=2.0.0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Build podcast index and upload to GCS
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        run: |
          python3 api/build_index.py \
            --output /tmp/podcast-index.json.gz \
            --bucket "$GCS_BUCKET"

      - name: Mirror index to GitHub Pages docs (legacy clients)
        run: |
          cp /tmp/podcast-index.json.gz docs/podcast-index.json.gz
          cp /tmp/podcast-index-meta.json docs/podcast-index-meta.json

          if git diff --quiet -- docs/podcast-index.json.gz docs/podcast-index-meta.json; then
            echo "No index changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/podcast-index.json.gz docs/podcast-index-meta.json
          git commit -m "chore(index): refresh legacy GitHub Pages mirror"
          git push

