# Nginx configuration for BBC Radio Player self-hosted deployment.
# Listens on port 5000 (HTTP) — Tailscale Funnel on :8443 provides HTTPS termination.
# Deploy to: /etc/nginx/sites-available/bbc-radio

server {
    listen 127.0.0.1:5000;
    server_name _;

    # Static index files (replaces GCS)
    location /data/ {
        alias /home/shaivure/bbc-radio/data/;
        autoindex off;

        location ~* \.json\.gz$ {
            add_header Cache-Control "public, max-age=21600";
            add_header Content-Type "application/octet-stream";
            add_header Access-Control-Allow-Origin "*";
        }
        location ~* \.json$ {
            add_header Cache-Control "no-cache, max-age=0";
            add_header Content-Type "application/json";
            add_header Access-Control-Allow-Origin "*";
        }
    }

    # Proxy to analytics server (port 5002)
    location /event {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /stats {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
    }

    location /rating {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
    }

    location /ratings {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
    }

    location /export.csv {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
    }

    # Proxy to search server (port 5001)
    location /search/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
    }

    location /index/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
    }

    location /summarize {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
    }

    location /health/api {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default — analytics server status page
    location / {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
