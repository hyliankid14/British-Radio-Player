name: BBCRadioPlayer
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.hyliankid14.bbcradioplayer.ios
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: ""
configs:
  Debug: debug
  Release: release
targets:
  BBCRadioPlayer:
    type: application
    platform: iOS
    sources:
      - BBCRadioPlayer
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: BBC Radio Player
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIBackgroundModes:
          - audio
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.music
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
